<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Ações do Banco</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/Vector-Bank-PNG-Pic.png" type="imagem/x-icon">
</head>
<body>
    <div class="center">
        <div class="box">
            <h1 class="center">Central de Ações do Banco</h1>
            <h2>Minhas Ações</h2>
            <table>
                <tr>
                    <th>Ação</th>
                    <th>Quantidade</th>
                    <th>Preço</th>
                </tr>
                <tr>
                    <td>Ação XYZ</td>
                    <td>100</td>
                    <td>R$50,00</td>
                </tr>

            </table>
            <button class="botao">Comprar Mais Ações</button>
            <button class="botao">Vender Ações</button>
        </div>
    </div>
</body>
</html>
